{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="text-center p-5">
        <div class="mb-5">
            <i class="bi bi-check-circle-fill text-success" style="font-size: 6rem;"></i>
        </div>
        <h1 class="display-4 fw-bold text-success mb-4">Application Submitted! 🎉</h1>
        <p class="lead mb-5">Your application has been successfully sent to the employer.</p>
        <div class="d-grid gap-2 d-md-flex justify-content-md-center">
            <a href="{{ url_for('dashboard') }}" class="btn btn-success btn-lg px-4">
                📊 View My Applications
            </a>
            <a href="{{ url_for('home') }}" class="btn btn-outline-primary btn-lg px-4">
                🔍 Find More Jobs
            </a>
        </div>
    </div>
</div>

<script>
setTimeout(() => {
    window.location.href = "{{ url_for('dashboard') }}";
}, 4000);
</script>
{% endblock %}
