{% extends "base.html" %}
{% block content %}
<h3 class="text-center mb-4">Post a Job</h3>
<form method="POST" class="col-md-8 offset-md-2">
  <div class="mb-3">
    <label>Job Title</label>
    <input type="text" name="title" class="form-control" required>
  </div>
  <div class="row mb-3">
    <div class="col">
      <label>Location</label>
      <input type="text" name="location" class="form-control">
    </div>
    <div class="col">
      <label>Job Type</label>
      <input type="text" name="job_type" class="form-control" placeholder="Internship, Full Time">
    </div>
  </div>
  <div class="row mb-3">
    <div class="col">
      <label>Vacancy</label>
      <input type="number" name="vacancy" class="form-control">
    </div>
    <div class="col">
      <label>Salary</label>
      <input type="text" name="salary" class="form-control">
    </div>
  </div>
  <div class="mb-3">
    <label>Description</label>
    <textarea name="description" class="form-control" rows="4"></textarea>
  </div>
  <div class="mb-3">
    <label>Experience</label>
    <input type="text" name="experience" class="form-control">
  </div>
  <div class="mb-3">
    <label>Tags</label>
    <input type="text" name="tags" class="form-control">
  </div>
  <div class="row">
    <div class="col">
      <label>Gender</label>
      <select name="gender" class="form-control">
        <option>Any</option>
        <option>Male</option>
        <option>Female</option>
      </select>
    </div>
    <div class="col">
      <label>Deadline</label>
      <input type="date" name="deadline" class="form-control">
    </div>
  </div>
  <button class="btn btn-primary mt-3 w-100">Post Job</button>
</form>
{% endblock %}
