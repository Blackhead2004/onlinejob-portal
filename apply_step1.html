{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card border-0 shadow-lg">
            <div class="card-body p-5 text-center">
                <div class="mb-5">
                    <i class="bi bi-briefcase-fill text-primary" style="font-size: 4rem;"></i>
                </div>
                <h2 class="fw-bold mb-4">{{ job.title }}</h2>
                <div class="row text-start mb-4">
                    <div class="col-6">
                        <small class="text-muted">
                            <i class="bi bi-building me-1"></i>{{ job.company_email }}
                        </small>
                    </div>
                    <div class="col-6">
                        <small class="text-muted">
                            <i class="bi bi-geo-alt me-1"></i>{{ job.location }}
                        </small>
                    </div>
                </div>

                <form method="POST">
                    <div class="mb-4">
                        <label class="form-label fw-bold">📝 Cover Letter (Optional)</label>
                        <textarea name="cover_letter" class="form-control" rows="6"
                                placeholder="Tell us why you're perfect for this role... (Boost your chances!)"></textarea>
                    </div>
                    <button type="submit" class="btn btn-danger btn-lg w-100 fw-bold">
                        🚀 Submit Application
                    </button>
                </form>
                <div class="mt-4">
                    <a href="{{ url_for('job_detail', job_id=job_id) }}" class="text-muted">
                        ← Back to Job Details
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
